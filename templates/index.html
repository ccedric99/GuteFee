<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Timer</title>
</head>
<body>
    <h1>Gute Fee</h1>
    <h2>Hallo Alina,</h2>
    <section>hier ist deine gute Fee. Unten kannst du eingeben in wie vielen Minuten du dich auf den Weg machen musst.</section>
    <section>Geb einfach ein wie viel Zeit du noch hast und ich erinnere dich.</section>
    <input type="number" id="minuten" placeholder="Minuten bis du los musst">
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Abbrechen</button>

    <p id="status"></p>

    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        function startTimer() {
            const minuten = document.getElementById("minuten").value;
            socket.emit("start_timer", {minuten: minuten});
            document.getElementById("status").innerText = "Timer läuft...";
        }

        function stopTimer() {
            socket.emit("stop_timer");
            document.getElementById("status").innerText = "";
            document.getElementById("minuten").value = "";
        }

        socket.on("erinnerung", function(data) {
            document.getElementById("status").innerText = data.nachricht;
            speak(data.nachricht);
        });

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "de-DE";
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
